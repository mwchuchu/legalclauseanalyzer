<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat History - Legal Clause Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #edf2fb;
      font-family: 'Segoe UI', sans-serif;
    }

    .history-container {
      max-width: 850px;
      margin: 40px auto;
      padding: 30px;
      background-color: #ffffff;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    .history-header h2 {
      font-weight: bold;
      color: #0d6efd;
      margin-bottom: 10px;
    }

    .nav-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chat-bubble {
      background-color: #f0f4ff;
      border-left: 5px solid #0d6efd;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 20px;
      transition: box-shadow 0.3s ease, background-color 0.3s;
      cursor: pointer;
    }

    .chat-bubble:hover {
      background-color: #e1ebff;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .chat-bubble p {
      margin-bottom: 8px;
      font-size: 1rem;
    }

    .chat-bubble small {
      font-size: 0.85rem;
      color: #555;
    }

    .intent-badge {
      padding: 5px 10px;
      background-color: #d0e4ff;
      color: #0d6efd;
      font-size: 12px;
      font-weight: 600;
      border-radius: 5px;
      display: inline-block;
      margin-top: 8px;
    }

    .user-label {
      color: #093b8f;
    }

    .back-button,
    .btn-home,
    .btn-chat {
      font-size: 0.9rem;
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="history-container">
  <div class="history-header">
    <h2>📜 Sessions</h2>
    <div class="nav-buttons">
      <a href="/" class="btn btn-outline-primary btn-home">🏠 Home</a>
    </div>
  </div>

  {% for session in sessions %}
    <div class="chat-bubble session-entry" data-session-id="{{session.session_id}}">
      <p><span class="fw-bold user-label">📜 Session:</span> {{ session.session_name | safe }}</p>
      <small>
        {% if session.created_at %}
          📅 {{ session.created_at.strftime('%b %d, %Y') }} - 🕒 {{ session.created_at.strftime('%I:%M %p') }}
        {% else %}
          N/A
        {% endif %}
      </small>
      <form id="sessionForm" method="POST" action="/chat-history" style="display:none;">
          <input type="hidden" name="session_id" id="hiddenSessionId">
      </form>
    </div>
  {% endfor %}
</div>

<!-- Optional: Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  document.querySelectorAll('.session-entry').forEach(entry => {
    entry.addEventListener('click', function () {
      const sessionId = this.dataset.sessionId;
      document.getElementById('hiddenSessionId').value = sessionId;
      document.getElementById('sessionForm').submit();
    });
  });
</script>

</body>
</html>
