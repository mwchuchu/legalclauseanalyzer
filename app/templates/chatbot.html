<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Legal Clause Chatbot - Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #e8f0fd;
      font-family: 'Segoe UI', sans-serif;
    }

    .chat-container {
      max-width: 850px;
      margin: 40px auto;
      background-color: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      height: 90vh;
      overflow: hidden;
    }

    .chat-header {
      padding: 20px;
      border-bottom: 2px solid #cfe2ff;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      background-color: #e3f2fd;
      color: #0d47a1;
      border-radius: 20px 20px 0 0;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background-color: #f5f9ff;
    }

    .chat-message {
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
    }

    .user-msg {
      justify-content: flex-end;
    }

    .bot-msg {
      justify-content: flex-start;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 20px;
      max-width: 75%;
      line-height: 1.5;
      font-size: 15px;
    }

    .bubble.user {
      background-color: #007bff;
      color: white;
    }
     .bubble.bot h1, .bubble.bot h2, .bubble.bot h3 {
    margin-top: 10px;
    font-weight: bold;
    color: #0d47a1;
  }

  .bubble.bot code {
    background-color: #f1f1f1;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: monospace;
  }

  .bubble.bot pre {
    background-color: #f5f5f5;
    padding: 10px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 14px;
  }

  .bubble.bot a {
    color: #007bff;
    text-decoration: underline;
  }

  .bubble.bot ul, .bubble.bot ol {
    padding-left: 20px;
    margin: 10px 0;
  }

  .bubble.bot blockquote {
    border-left: 4px solid #ccc;
    padding-left: 10px;
    color: #555;
    font-style: italic;
    margin: 10px 0;
  }

    .typing-indicator {
      background-color: #e1ecf9;
      color: #555;
      font-style: italic;
      padding: 10px 16px;
      border-radius: 15px;
      animation: pulse 1.5s infinite ease-in-out;
      max-width: 200px;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

    .chat-input-area {
      padding: 15px;
      border-top: 1px solid #cfe2ff;
      display: flex;
      gap: 10px;
      background-color: #f0f4ff;
    }

    .chat-input-area textarea {
      flex: 1;
      resize: none;
      border-radius: 10px;
      border: 1px solid #ccc;
      padding: 10px;
    }

    .send-btn {
      width: 100px;
    }

    .button-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      border-top: 1px solid #cfe2ff;
      background-color: #f8faff;
    }

    .btn-secondary,
    .btn-outline-primary {
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    🤖 Legal Clause Assistant
  </div>

  <div id="chatBox" class="chat-box">
    {% if initial_bot_response %}
    <div class="chat-message bot-msg">
      <div class="bubble bot">
        {{ initial_bot_response | safe }}
      </div>
    </div>
    {% endif %}
  </div>

  <div class="chat-input-area">
    <textarea id="userInput" name="botprompt" class="form-control" rows="2" placeholder="Type your legal question..."></textarea>
    <button class="btn btn-primary send-btn" onclick="sendMessage()">Send</button>
  </div>

  <div class="button-row">
    <a href="/" class="btn btn-outline-primary">🏠 Home</a>
    <a href="/history" class="btn btn-outline-primary">🕘 View History</a>
    <button class="btn btn-secondary" onclick="clearChat()">🔁 Clear Chat</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>

  document.getElementById("userInput").addEventListener("keydown", function (event) {
    if (event.key === "Enter" && !event.shiftKey) {
      event.preventDefault();
      sendMessage();
    }
  });

  function appendMessage(content, sender) {
    const messageDiv = document.createElement("div");
    messageDiv.classList.add("chat-message", sender === "user" ? "user-msg" : "bot-msg");

    const bubble = document.createElement("div");
    bubble.classList.add("bubble", sender === "user" ? "user" : "bot");

    bubble.innerText = content;
      if (sender === "bot") {
    // Convert markdown to HTML
    bubble.innerHTML = marked.parse(content);
    } else {
    // Show user message as plain text
    bubble.innerText = content;
    }

    messageDiv.appendChild(bubble);
    const chatbox= document.getElementById("chatBox");
    chatbox.appendChild(messageDiv);
    chatbox.scrollTop=chatbox.scrollHeight;
  }

  function showTypingIndicator() {
    const typingDiv = document.createElement("div");
    typingDiv.classList.add("chat-message", "bot-msg");
    typingDiv.id = "typing-indicator";

    const bubble = document.createElement("div");
    bubble.classList.add("typing-indicator");
    bubble.innerText = "Typing...";

    typingDiv.appendChild(bubble);
    document.getElementById("chatBox").appendChild(typingDiv);
    document.getElementById("chatBox").scrollTop = document.getElementById("chatBox").scrollHeight;
  }

  function removeTypingIndicator() {
    const typing = document.getElementById("typing-indicator");
    if (typing) typing.remove();
  }

  function clearChat() {
    document.getElementById("chatBox").innerHTML = "";
  }

  async function sendMessage() {
    const session_id = "{{ session_id | safe }}";
    const userInput = document.getElementById("userInput");
    const message = userInput.value.trim();
    if (!message) return;

    appendMessage(message, "user");
    userInput.value = "";

    showTypingIndicator();

    try {
      const res = await fetch("/botchat", {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `botprompt=${encodeURIComponent(message)}&session_id=${encodeURIComponent(session_id)}`
      });

      if (!res.ok) throw new Error("Network error");

      const data = await res.json();
      removeTypingIndicator();
      appendMessage(data['response'],"bot");
    } catch (err) {
      removeTypingIndicator();
      appendMessage("⚠️ Something went wrong. Please try again later.", "bot");
    }
  }
</script>

</body>
</html>
